<!-- Trigger: eye icon button -->
<button
  type="button"
  (click)="toggle()"
  [title]="'common.viewExpression' | transloco"
  class="flex items-center justify-center w-6 h-6 rounded text-muted dark:text-dark-muted hover:text-accent dark:hover:text-accent hover:bg-paper2 dark:hover:bg-dark-surface2 transition-colors cursor-pointer"
>
  @if (exportingPng()) {
    <!-- Spinner: exporting PNG -->
    <span class="w-3 h-3 border border-accent border-t-transparent rounded-full animate-spin"></span>
  } @else {
    <!-- Eye icon -->
    <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none"
      stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
      <circle cx="12" cy="12" r="3"/>
    </svg>
  }
</button>

<!-- Modal overlay -->
@if (isOpen()) {
  <!-- Backdrop -->
  <div
    class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm"
    (click)="close()"
    role="dialog"
    aria-modal="true"
  >
    <!-- Card (stop propagation so clicks inside don't close) -->
    <div
      class="relative w-full max-w-2xl rounded-xl border border-border dark:border-dark-border bg-paper dark:bg-dark-bg shadow-2xl flex flex-col gap-5 p-6 max-h-[90vh] overflow-y-auto"
      (click)="$event.stopPropagation()"
    >
      <!-- Header -->
      <div class="flex items-center justify-between gap-4">
        <h2 class="text-sm font-semibold text-ink dark:text-dark-ink font-body">
          {{ 'common.viewExpression' | transloco }}
        </h2>
        <button
          type="button"
          (click)="close()"
          [title]="'common.close' | transloco"
          class="flex items-center justify-center w-7 h-7 rounded text-muted dark:text-dark-muted hover:text-ink dark:hover:text-dark-ink hover:bg-paper2 dark:hover:bg-dark-surface2 transition-colors cursor-pointer shrink-0"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 6 6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>

      <!-- Large rendered expression -->
      <div class="rounded-lg border border-border dark:border-dark-border bg-paper2 dark:bg-dark-surface px-6 py-5 flex items-center justify-center min-h-16 overflow-x-auto">
        <span
          class="text-ink dark:text-dark-ink text-xl block"
          [mathjax]="'\\[' + tex() + '\\]'"
        ></span>
      </div>

      <!-- Raw text sections -->
      <div class="flex flex-col gap-3">

        <!-- LaTeX -->
        <div class="flex flex-col gap-1.5">
          <div class="flex items-center justify-between gap-2">
            <span class="text-xs font-semibold font-mono text-muted dark:text-dark-muted uppercase tracking-wide">
              {{ 'common.latex' | transloco }}
            </span>
            <button
              type="button"
              (click)="copyLatex()"
              class="flex items-center gap-1.5 px-2.5 py-1 rounded text-xs font-mono transition-colors cursor-pointer"
              [class]="copiedLatex()
                ? 'text-green-600 dark:text-green-400 bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-800'
                : 'text-ink dark:text-dark-ink bg-paper2 dark:bg-dark-surface2 border border-border dark:border-dark-border hover:border-accent dark:hover:border-accent hover:text-accent'"
            >
              @if (copiedLatex()) {
                <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M20 6 9 17l-5-5"/>
                </svg>
                {{ 'common.copied' | transloco }}
              } @else {
                <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect width="14" height="14" x="8" y="8" rx="2"/>
                  <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>
                </svg>
                {{ 'common.copyLatex' | transloco }}
              }
            </button>
          </div>
          <pre class="rounded border border-border dark:border-dark-border bg-paper dark:bg-dark-surface px-3 py-2.5 text-xs font-mono text-ink dark:text-dark-ink overflow-x-auto whitespace-pre-wrap break-all select-all">{{ tex() }}</pre>
        </div>

        <!-- Maxima (only if provided) -->
        @if (maxima()) {
          <div class="flex flex-col gap-1.5">
            <div class="flex items-center justify-between gap-2">
              <span class="text-xs font-semibold font-mono text-muted dark:text-dark-muted uppercase tracking-wide">
                {{ 'common.maxima' | transloco }}
              </span>
              <button
                type="button"
                (click)="copyMaximaExpr()"
                class="flex items-center gap-1.5 px-2.5 py-1 rounded text-xs font-mono transition-colors cursor-pointer"
                [class]="copiedMaxima()
                  ? 'text-green-600 dark:text-green-400 bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-800'
                  : 'text-ink dark:text-dark-ink bg-paper2 dark:bg-dark-surface2 border border-border dark:border-dark-border hover:border-accent dark:hover:border-accent hover:text-accent'"
              >
                @if (copiedMaxima()) {
                  <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 6 9 17l-5-5"/>
                  </svg>
                  {{ 'common.copied' | transloco }}
                } @else {
                  <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect width="14" height="14" x="8" y="8" rx="2"/>
                    <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>
                  </svg>
                  {{ 'common.copyMaxima' | transloco }}
                }
              </button>
            </div>
            <pre class="rounded border border-border dark:border-dark-border bg-paper dark:bg-dark-surface px-3 py-2.5 text-xs font-mono text-ink dark:text-dark-ink overflow-x-auto whitespace-pre-wrap break-all select-all">{{ maxima() }}</pre>
          </div>
        }
      </div>

      <!-- Download actions (only if mathEl provided) -->
      @if (mathEl()) {
        <div class="flex items-center gap-2 pt-1 border-t border-border dark:border-dark-border">
          <!-- SVG download -->
          <button
            type="button"
            (click)="exportSvg()"
            class="flex items-center gap-1.5 px-3 py-1.5 rounded border border-border dark:border-dark-border text-xs font-mono text-ink dark:text-dark-ink hover:border-accent dark:hover:border-accent hover:text-accent transition-colors cursor-pointer"
          >
            <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/>
              <path d="M14 2v4a2 2 0 0 0 2 2h4"/>
            </svg>
            {{ 'common.downloadSvg' | transloco }}
          </button>

          <!-- PNG download -->
          <button
            type="button"
            (click)="exportPng()"
            [disabled]="exportingPng()"
            class="flex items-center gap-1.5 px-3 py-1.5 rounded border border-border dark:border-dark-border text-xs font-mono text-ink dark:text-dark-ink hover:border-accent dark:hover:border-accent hover:text-accent transition-colors cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed"
          >
            @if (exportingPng()) {
              <span class="w-3 h-3 border border-current border-t-transparent rounded-full animate-spin"></span>
            } @else {
              <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect width="18" height="18" x="3" y="3" rx="2"/>
                <circle cx="9" cy="9" r="2"/>
                <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/>
              </svg>
            }
            {{ 'common.downloadPng' | transloco }}
          </button>
        </div>
      }
    </div>
  </div>
}
