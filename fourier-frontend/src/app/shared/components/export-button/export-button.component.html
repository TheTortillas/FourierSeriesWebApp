<div class="relative inline-flex shrink-0">
  <!-- Trigger button -->
  <button
    type="button"
    (click)="toggle()"
    [title]="'Exportar'"
    class="flex items-center justify-center w-6 h-6 rounded text-muted dark:text-dark-muted hover:text-accent dark:hover:text-accent hover:bg-paper2 dark:hover:bg-dark-surface2 transition-colors cursor-pointer"
    [class.text-accent]="copiedLatex()"
  >
    @if (copiedLatex()) {
      <!-- Checkmark: copied feedback -->
      <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 6 9 17l-5-5"/>
      </svg>
    } @else if (exportingPng()) {
      <!-- Spinner: exporting PNG -->
      <span class="w-3 h-3 border border-accent border-t-transparent rounded-full animate-spin"></span>
    } @else {
      <!-- Download icon -->
      <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
    }
  </button>

  <!-- Popover -->
  @if (isOpen()) {
    <div
      class="absolute right-0 top-7 z-50 min-w-[9rem] rounded-lg border border-border dark:border-dark-border bg-paper dark:bg-dark-bg shadow-lg py-1 text-xs font-mono"
      role="menu"
    >
      <!-- LaTeX copy -->
      <button
        type="button"
        (click)="copyLatex()"
        class="w-full flex items-center gap-2 px-3 py-1.5 text-left text-ink dark:text-dark-ink hover:bg-paper2 dark:hover:bg-dark-surface2 transition-colors cursor-pointer"
        role="menuitem"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3 shrink-0 text-muted" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect width="14" height="14" x="8" y="8" rx="2"/>
          <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>
        </svg>
        Copiar LaTeX
      </button>

      @if (mathEl()) {
        <!-- SVG download -->
        <button
          type="button"
          (click)="exportSvg()"
          class="w-full flex items-center gap-2 px-3 py-1.5 text-left text-ink dark:text-dark-ink hover:bg-paper2 dark:hover:bg-dark-surface2 transition-colors cursor-pointer"
          role="menuitem"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3 shrink-0 text-muted" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/>
            <path d="M14 2v4a2 2 0 0 0 2 2h4"/>
          </svg>
          Descargar SVG
        </button>

        <!-- PNG download -->
        <button
          type="button"
          (click)="exportPng()"
          class="w-full flex items-center gap-2 px-3 py-1.5 text-left text-ink dark:text-dark-ink hover:bg-paper2 dark:hover:bg-dark-surface2 transition-colors cursor-pointer"
          role="menuitem"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3 shrink-0 text-muted" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="18" height="18" x="3" y="3" rx="2"/>
            <circle cx="9" cy="9" r="2"/>
            <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/>
          </svg>
          Descargar PNG
        </button>
      }
    </div>
  }
</div>
