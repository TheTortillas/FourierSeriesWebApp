<nav
  class="shrink-0 border-b border-border dark:border-dark-border bg-paper dark:bg-dark-bg px-6 h-12 flex items-center justify-between"
>
  <!-- Logo -->
  <a
    [routerLink]="'/' + lang() + '/home'"
    class="flex items-center gap-2 text-ink dark:text-dark-ink hover:text-accent dark:hover:text-accent transition-colors group"
  >
    <svg
      viewBox="0 0 484.21 484.21"
      fill="currentColor"
      class="w-4 h-4 shrink-0 opacity-80 group-hover:opacity-100 transition-opacity"
      aria-hidden="true"
    >
      <path
        d="M395.527,97.043V55.352H124.537l159.46,171.507c9.983,10.749,9.848,27.458-0.319,38.026
               L126.017,428.861h269.504v-25.18c0-15.256,12.413-27.668,27.674-27.668
               c15.256,0,27.681,12.412,27.681,27.668v52.848c0,15.262-12.419,27.681-27.681,27.681H61.014
               c-11.106,0-21.107-6.603-25.464-16.834c-4.359-10.226-2.189-22.012,5.509-30.026
               l184.584-191.964L40.743,46.521c-7.492-8.068-9.496-19.798-5.101-29.899
               C40.042,6.525,50.005,0,61.014,0h362.188c15.255,0,27.68,12.413,27.68,27.68v69.363
               c0,15.259-12.419,27.677-27.68,27.677C407.94,124.72,395.527,112.308,395.527,97.043z"
      />
    </svg>
    <span class="font-display text-base leading-none">Fourier Web Calculator</span>
  </a>

  <!-- Actions -->
  <div class="flex items-center gap-0.5">

    <!-- Grupo 1: Navegación -->
    <a
      [routerLink]="'/' + lang() + '/calculator'"
      routerLinkActive="text-accent"
      class="hidden sm:flex px-2 py-1.5 rounded text-xs font-mono text-muted dark:text-dark-muted hover:text-ink dark:hover:text-dark-ink hover:bg-paper2 dark:hover:bg-dark-surface transition-colors"
    >
      Series
    </a>
    <a
      [routerLink]="'/' + lang() + '/transforms'"
      routerLinkActive="text-accent"
      class="hidden sm:flex px-2 py-1.5 rounded text-xs font-mono text-muted dark:text-dark-muted hover:text-ink dark:hover:text-dark-ink hover:bg-paper2 dark:hover:bg-dark-surface transition-colors"
    >
      Transformadas
    </a>

    <div class="w-px h-4 bg-border dark:bg-dark-border mx-1.5 shrink-0"></div>

    <!-- Grupo 2: Cuota + cuenta -->
    @if (userStore.quota()?.remaining !== null && userStore.quota()?.remaining !== undefined) {
      <span
        title="Cálculos restantes esta semana"
        [class]="
          userStore.quota()!.remaining! <= 0
            ? 'flex items-center gap-1 px-2 py-1 rounded text-[11px] font-mono bg-red-50 dark:bg-red-950/30 text-red-500 border border-red-200 dark:border-red-800 select-none'
            : 'flex items-center gap-1 px-2 py-1 rounded text-[11px] font-mono bg-paper2 dark:bg-dark-surface text-muted dark:text-dark-muted border border-border dark:border-dark-border select-none'
        "
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.75"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="w-3 h-3 shrink-0"
        >
          <rect x="4" y="2" width="16" height="20" rx="2" />
          <path d="M9 7h6M9 12h6M9 17h4" />
        </svg>
        {{ userStore.quota()!.remaining }}
      </span>
    }

    @if (userStore.isAuthenticated()) {
      <a
        [routerLink]="'/' + lang() + '/profile'"
        class="hidden sm:flex items-center gap-1.5 px-2 py-1.5 rounded text-xs font-mono text-muted dark:text-dark-muted hover:text-ink dark:hover:text-dark-ink hover:bg-paper2 dark:hover:bg-dark-surface transition-colors"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.75"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="w-3.5 h-3.5 shrink-0"
        >
          <circle cx="12" cy="8" r="4" />
          <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
        </svg>
        {{ userStore.displayName() }}
      </a>

      <button
        type="button"
        (click)="auth.logout()"
        title="Cerrar sesión"
        class="flex items-center gap-1 px-2 py-1.5 rounded text-muted dark:text-dark-muted text-xs font-mono hover:text-red-500 dark:hover:text-red-400 hover:bg-red-50 dark:hover:bg-red-950/30 transition-colors cursor-pointer"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.75"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="w-3.5 h-3.5 shrink-0"
        >
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <polyline points="16 17 21 12 16 7" />
          <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
        <span class="hidden sm:inline">Salir</span>
      </button>
    } @else {
      <a
        [routerLink]="'/' + lang() + '/auth/login'"
        class="flex items-center px-2 py-1.5 rounded text-muted dark:text-dark-muted text-xs font-mono hover:text-ink dark:hover:text-dark-ink hover:bg-paper2 dark:hover:bg-dark-surface transition-colors"
      >
        Ingresar
      </a>
      <a
        [routerLink]="'/' + lang() + '/auth/register'"
        class="flex items-center px-2.5 py-1.5 rounded bg-accent text-white text-xs font-mono hover:bg-accent/90 transition-colors"
      >
        Registrarse
      </a>
    }

    <div class="w-px h-4 bg-border dark:bg-dark-border mx-1.5 shrink-0"></div>

    <!-- Grupo 3: Controles de apariencia (+ switcher de idioma futuro) -->
    <button
      (click)="theme.togglePalette()"
      type="button"
      [title]="theme.isNeutral ? 'Cambiar a paleta coffee' : 'Cambiar a paleta neutral'"
      class="px-2 py-1.5 rounded text-[10px] font-mono uppercase tracking-wider text-muted dark:text-dark-muted hover:text-ink dark:hover:text-dark-ink hover:bg-paper2 dark:hover:bg-dark-surface transition-colors cursor-pointer"
    >
      {{ theme.isNeutral ? 'Neutral' : 'Coffee' }}
    </button>

    <button
      (click)="theme.toggle()"
      type="button"
      title="Cambiar tema"
      class="p-2 rounded text-muted dark:text-dark-muted hover:text-ink dark:hover:text-dark-ink hover:bg-paper2 dark:hover:bg-dark-surface transition-colors cursor-pointer"
    >
      @if (theme.isDark) {
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.75"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="w-4 h-4"
        >
          <circle cx="12" cy="12" r="4" />
          <path
            d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"
          />
        </svg>
      } @else {
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.75"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="w-4 h-4"
        >
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
        </svg>
      }
    </button>

  </div>
</nav>
