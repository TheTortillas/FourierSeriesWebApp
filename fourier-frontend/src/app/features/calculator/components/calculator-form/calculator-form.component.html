<div class="flex flex-col gap-5">
  <!-- ── Live f(x) preview ──────────────────────────────────────────────── -->
  @if (store.previewLatex()) {
    <div
      class="rounded border border-border dark:border-dark-border bg-paper dark:bg-dark-surface px-4 py-3 overflow-x-auto text-center"
    >
      <span
        class="text-ink dark:text-dark-ink text-base"
        [mathjax]="'\\[' + store.previewLatex() + '\\]'"
      ></span>
    </div>
  }

  <div
    class="flex flex-col gap-5"
    [class.pointer-events-none]="store.inputsLocked()"
    [class.opacity-70]="store.inputsLocked()"
  >
  <!-- ── Tramos ─────────────────────────────────────────────────────────── -->
  <section class="space-y-2">
    <div class="flex items-center justify-between">
      <h2 class="text-sm font-semibold text-ink dark:text-dark-ink font-body">Función a trozos</h2>
    </div>

    <div class="space-y-2">
      @for (seg of store.segments(); track seg.id; let i = $index) {
        <app-segment-input
          [segment]="seg"
          [index]="i"
          [isOnly]="store.segments().length === 1"
          [error]="store.segmentErrors()[i]"
        />
      }
    </div>

    <!-- Add segment -->
    <button
      (click)="store.addSegment()"
      type="button"
      class="flex items-center gap-1.5 text-xs text-accent dark:text-accent hover:underline cursor-pointer font-mono transition-opacity"
    >
      + añadir tramo
    </button>
  </section>

  <!-- ── Variable de integración ───────────────────────────────────────── -->
  <div class="flex items-center gap-2">
    <p class="text-xs text-muted font-mono shrink-0">Variable</p>
    <div class="flex gap-1">
      @for (v of ['x', 't', 'u', 's']; track v) {
        <button
          type="button"
          (click)="store.setIntVar(v)"
          [class]="
            store.intVar() === v
              ? 'w-7 h-7 rounded text-xs font-mono font-semibold bg-accent text-paper cursor-pointer'
              : 'w-7 h-7 rounded text-xs font-mono text-ink dark:text-dark-ink border border-border dark:border-dark-border hover:border-accent dark:hover:border-accent transition-colors cursor-pointer'
          "
        >
          {{ v }}
        </button>
      }
    </div>
  </div>

  <!-- ── Tipo de serie ──────────────────────────────────────────────────── -->
  <app-series-type-selector />

  <!-- ── Número de coeficientes a calcular (backend) ────────────────────── -->
  <div class="space-y-1.5">
    <div class="flex items-center justify-between">
      <p class="text-xs text-muted font-mono">Coeficientes a calcular</p>
    </div>
    <select
      [value]="'' + store.nTerms()"
      (change)="store.setNTerms(+$any($event.target).value)"
      [disabled]="store.inputsLocked()"
      required
      class="w-full px-2 py-1.5 rounded border border-border dark:border-dark-border bg-paper dark:bg-dark-surface text-ink dark:text-dark-ink text-xs font-mono"
    >
      <option value="25">25 términos</option>
      <option value="50">50 términos</option>
      <option value="75">75 términos</option>
      <option value="100">100 términos</option>
    </select>
  </div>

  <!-- ── Error ──────────────────────────────────────────────────────────── -->
  @if (store.error()) {
    <div
      class="rounded border border-red-300 dark:border-red-800 bg-red-50 dark:bg-red-950/30 px-3 py-2"
    >
      <p class="text-xs text-red-600 dark:text-red-400 font-mono">
        {{ store.error() }}
      </p>
    </div>
  }

  <!-- ── Calcular ───────────────────────────────────────────────────────── -->
  <button
    (click)="store.calculate()"
    [disabled]="!store.isValid() || store.loading() || store.hasResult()"
    type="button"
    class="w-full py-2.5 rounded font-semibold text-sm font-body transition-all cursor-pointer bg-accent text-paper hover:bg-accent/90 active:scale-[0.99] disabled:opacity-40 disabled:cursor-not-allowed"
  >
    @if (store.loading()) {
      <span class="flex items-center justify-center gap-2">
        <span
          class="inline-block w-3.5 h-3.5 border-2 border-paper/40 border-t-paper rounded-full animate-spin"
        ></span>
        Calculando…
      </span>
    } @else {
      Calcular serie
    }
  </button>
  </div>

  <!-- ── Reset ─────────────────────────────────────────────────────────── -->
  @if (store.hasResult()) {
    <button
      (click)="store.clearComputedResult()"
      type="button"
      class="w-full py-1.5 rounded border border-border dark:border-dark-border text-xs text-muted hover:text-ink dark:hover:text-dark-ink hover:border-ink dark:hover:border-dark-ink transition-colors cursor-pointer font-mono"
    >
      Nuevo cálculo
    </button>
  }
</div>
