<div class="min-h-screen bg-paper dark:bg-dark-bg">

  <!-- ── Header ────────────────────────────────────────────────────────────── -->
  <header class="border-b border-border dark:border-dark-border px-6 py-4 flex items-center justify-between">
    <div>
      <h1 class="font-display text-2xl text-ink dark:text-dark-ink">
        Serie de Fourier
      </h1>
      <p class="text-sm text-muted dark:text-dark-muted font-body mt-0.5">
        Ingresa la función a trozos y selecciona el tipo de serie
      </p>
    </div>
    <!-- Theme toggle -->
    <button
      (click)="theme.toggle()"
      type="button"
      title="Cambiar tema"
      class="p-2 rounded-full border border-border dark:border-dark-border
             text-muted dark:text-dark-muted hover:text-ink dark:hover:text-dark-ink
             hover:border-ink dark:hover:border-dark-ink transition-colors cursor-pointer">
      @if (theme.isDark) {
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             class="w-4 h-4">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
        </svg>
      } @else {
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             class="w-4 h-4">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      }
    </button>
  </header>

  <!-- ── Main layout ────────────────────────────────────────────────────────── -->
  <div class="flex flex-col lg:flex-row lg:h-[calc(100vh-73px)]">

    <!-- ── Left panel: form ───────────────────────────────────────────────── -->
    <aside class="w-full lg:w-96 xl:w-[420px] shrink-0
                  border-b lg:border-b-0 lg:border-r
                  border-border dark:border-dark-border
                  overflow-y-auto">
      <div class="p-5">
        <app-calculator-form />
      </div>
    </aside>

    <!-- ── Right panel: canvas + results ─────────────────────────────────── -->
    <main class="flex-1 min-h-0 overflow-y-auto flex flex-col">
      <div class="p-5 flex flex-col gap-5 flex-1 min-h-0">
        <app-results-summary class="flex-1 min-h-0" />
      </div>
    </main>

  </div>
</div>
