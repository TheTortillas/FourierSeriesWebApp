<div class="min-h-screen bg-paper dark:bg-dark-bg">

  <!-- ── Header ────────────────────────────────────────────────────────────── -->
  <header class="border-b border-border dark:border-dark-border px-6 py-4">
    <h1 class="font-display text-2xl text-ink dark:text-dark-ink">
      Serie de Fourier
    </h1>
    <p class="text-sm text-muted font-body mt-0.5">
      Ingresa la función a trozos y selecciona el tipo de serie
    </p>
  </header>

  <!-- ── Main layout ────────────────────────────────────────────────────────── -->
  <div class="flex flex-col lg:flex-row lg:h-[calc(100vh-73px)]">

    <!-- ── Left panel: form ───────────────────────────────────────────────── -->
    <aside class="w-full lg:w-96 xl:w-[420px] shrink-0
                  border-b lg:border-b-0 lg:border-r
                  border-border dark:border-dark-border
                  overflow-y-auto">
      <div class="p-5">
        <app-calculator-form />
      </div>
    </aside>

    <!-- ── Right panel: canvas + results ─────────────────────────────────── -->
    <main class="flex-1 overflow-y-auto">
      <div class="p-5 flex flex-col gap-5 h-full">
        <app-results-summary />
      </div>
    </main>

  </div>
</div>
