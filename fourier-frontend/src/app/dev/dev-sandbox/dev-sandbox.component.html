<div class="flex h-screen bg-gray-950 text-gray-100 font-mono">

  <!-- Sidebar -->
  <aside class="w-60 shrink-0 border-r border-gray-800 flex flex-col">
    <div class="p-4 border-b border-gray-800">
      <span class="text-yellow-400 font-bold text-sm uppercase tracking-widest">Dev Sandbox</span>
      <p class="text-gray-600 text-xs mt-0.5">solo en desarrollo</p>
    </div>

    <nav class="flex-1 overflow-y-auto p-2 space-y-0.5">
      @for (panel of panels; track panel.route) {
        @if (panel.ready) {
          <a
            [routerLink]="panel.route"
            routerLinkActive="bg-yellow-400 text-gray-900 font-semibold"
            class="flex items-center gap-2 rounded px-3 py-2 text-sm hover:bg-gray-800 transition-colors cursor-pointer"
          >
            <span class="text-yellow-700 text-[10px] w-4 shrink-0">{{ panel.phase }}</span>
            <span>{{ panel.label }}</span>
          </a>
        } @else {
          <div class="flex items-center gap-2 rounded px-3 py-2 text-sm text-gray-600 cursor-not-allowed">
            <span class="text-gray-700 text-[10px] w-4 shrink-0">{{ panel.phase }}</span>
            <span>{{ panel.label }}</span>
            <span class="ml-auto text-[10px] text-gray-700">pronto</span>
          </div>
        }
      }
    </nav>
  </aside>

  <!-- Content -->
  <main class="flex-1 overflow-auto p-6">
    <router-outlet />
  </main>

</div>
