<div class="flex flex-col h-full gap-4">
  <h2 class="text-yellow-400 font-bold text-lg border-b border-gray-700 pb-2 shrink-0">
    Canvas — Smoke test
  </h2>

  <!-- Controls -->
  <div class="flex items-center gap-4 shrink-0 flex-wrap">
    <div class="flex items-center gap-2">
      <span class="text-gray-500 text-xs">Eje X:</span>
      @for (fmt of xFormats; track fmt) {
        <button (click)="setFormat(fmt)"
          [class]="xFormat() === fmt
            ? 'bg-yellow-400 text-gray-900 text-xs px-3 py-1 rounded font-semibold cursor-pointer'
            : 'bg-gray-700 hover:bg-gray-600 text-gray-300 text-xs px-3 py-1 rounded transition-colors cursor-pointer'">
          {{ fmt }}
        </button>
      }
    </div>
    <button (click)="resetView()"
      class="bg-gray-700 hover:bg-gray-600 text-gray-300 text-xs px-3 py-1 rounded transition-colors cursor-pointer">
      Reset view
    </button>
  </div>

  <!-- Leyenda -->
  <div class="flex gap-4 text-xs shrink-0 flex-wrap">
    <span class="flex items-center gap-1.5">
      <span class="inline-block w-4 h-0.5 bg-[#8b2500]"></span> sin(x)
    </span>
    <span class="flex items-center gap-1.5">
      <span class="inline-block w-4 border-t border-dashed border-[#1a4a6b]"></span> cos(x)
    </span>
    <span class="flex items-center gap-1.5">
      <span class="inline-block w-4 h-0.5 bg-[#2d5a27]"></span> tan(x)
    </span>
    <span class="flex items-center gap-1.5">
      <span class="inline-block w-4 h-0.5 bg-[#b8860b]"></span> x²/10
    </span>
  </div>

  <!-- Canvas -->
  <div class="flex-1 border border-gray-700 rounded overflow-hidden min-h-0">
    <app-function-plot
      [layers]="layers()"
      [initialUnit]="75"
      [xAxisFormat]="xFormat()"
    />
  </div>
</div>
