<div class="flex flex-col h-full gap-4">
  <h2 class="text-yellow-400 font-bold text-lg border-b border-gray-700 pb-2 shrink-0">
    Canvas — Función + Aproximación Fourier
  </h2>

  <!-- Controls -->
  <div class="flex flex-wrap gap-4 shrink-0">

    <!-- Preset selector -->
    <div class="space-y-1">
      <p class="text-gray-500 text-xs">Función:</p>
      <div class="flex gap-2 flex-wrap">
        @for (p of presets; track p.label; let i = $index) {
          <button (click)="selectPreset(i)"
            [class]="selectedPreset() === i
              ? 'bg-yellow-400 text-gray-900 text-xs px-3 py-1 rounded font-semibold cursor-pointer'
              : 'bg-gray-700 hover:bg-gray-600 text-gray-300 text-xs px-3 py-1 rounded transition-colors cursor-pointer'">
            {{ p.label }}
          </button>
        }
      </div>
    </div>

    <!-- N terms slider -->
    <div class="space-y-1">
      <p class="text-gray-500 text-xs">Términos N = {{ nTerms() }}</p>
      <input type="range" min="1" max="20" [value]="nTerms()"
        (input)="setTerms(+$any($event.target).value)"
        class="w-40 accent-yellow-400" />
    </div>

    <!-- Toggles -->
    <div class="flex gap-3 items-end">
      <button (click)="toggleOriginal()"
        [class]="showOriginal()
          ? 'flex items-center gap-1.5 text-xs px-3 py-1 rounded border border-[#8b2500] text-[#8b2500] cursor-pointer'
          : 'flex items-center gap-1.5 text-xs px-3 py-1 rounded border border-gray-700 text-gray-600 cursor-pointer'">
        <span class="inline-block w-3 h-0.5 bg-[#8b2500]"></span> Original
      </button>
      <button (click)="toggleApprox()"
        [class]="showApprox()
          ? 'flex items-center gap-1.5 text-xs px-3 py-1 rounded border border-[#1a4a6b] text-[#1a4a6b] cursor-pointer'
          : 'flex items-center gap-1.5 text-xs px-3 py-1 rounded border border-gray-700 text-gray-600 cursor-pointer'">
        <span class="inline-block w-3 h-0.5 bg-[#1a4a6b]"></span> Aproximación
      </button>
    </div>
  </div>

  <!-- Canvas -->
  <div class="flex-1 border border-gray-700 rounded overflow-hidden min-h-0">
    <app-function-plot
      [layers]="layers()"
      [initialUnit]="90"
      [xAxisFormat]="presets[selectedPreset()].xFormat"
    />
  </div>

  <!-- Info -->
  <p class="text-gray-700 text-xs shrink-0">
    Los coeficientes son numéricos de ejemplo. En producción vendrán del endpoint
    <code class="text-gray-500">POST /fourier/trigonometric/terms</code>.
  </p>
</div>
