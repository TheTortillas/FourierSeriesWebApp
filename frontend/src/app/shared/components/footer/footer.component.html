<footer 
  class="footer-section py-8 sm:py-12 border-t mt-6 relative overflow-hidden"
  [ngClass]="isDarkMode 
    ? 'border-gray-700 bg-gradient-to-b from-gray-900/50 to-gray-900/30' 
    : 'border-gray-200 bg-gradient-to-b from-gray-50 to-white'"
>
  <!-- Decorative background pattern -->
  <div 
    class="absolute inset-0 opacity-5"
    [ngClass]="isDarkMode ? 'footer-pattern-dark' : 'footer-pattern-light'"
  ></div>

  <div class="max-w-7xl mx-auto px-5 sm:px-6 lg:px-8 relative z-10">
    <div class="flex flex-col md:flex-row justify-between items-center gap-6">
      <!-- Left section: Brand/Copyright -->
      <div class="text-center md:text-left">
        <h3 
          class="font-semibold mb-2 text-lg"
          [ngClass]="isDarkMode ? 'text-cyan-400' : 'text-blue-600'"
        >
          Fourier Web Calculator
        </h3>
        <p 
          class="text-sm"
          [ngClass]="isDarkMode ? 'text-gray-400' : 'text-gray-600'"
        >
          &copy; {{ currentYear }} Desarrollado  
          
          por <span class="font-medium">Sebastián</span>
        </p>
        <p 
          class="text-xs mt-1"
          [ngClass]="isDarkMode ? 'text-gray-500' : 'text-gray-500'"
        >
          Proyecto de Titulación ESCOM-IPN
        </p>
      </div>

      <!-- Right section: Links -->
      <div class="flex flex-col sm:flex-row gap-3 sm:gap-6">
        <a
          href="https://github.com/TheTortillas/FourierSeriesWebApp"
          target="_blank"
          rel="noopener noreferrer"
          class="footer-link group flex items-center gap-2 px-4 py-2 rounded-lg transition-all duration-300"
          [ngClass]="isDarkMode 
            ? 'hover:bg-gray-800/50 text-gray-300 hover:text-cyan-400' 
            : 'hover:bg-blue-50 text-gray-700 hover:text-blue-600'"
        >
          <svg
            class="w-5 h-5 transition-transform duration-300 group-hover:scale-110 group-hover:rotate-12"
            fill="currentColor"
            viewBox="0 0 24 24"
            aria-hidden="true"
          >
            <path
              fill-rule="evenodd"
              clip-rule="evenodd"
              d="M12 .297c-6.63 0-12 5.373-12 12 0 5.301 
                3.438 9.8 8.205 11.387.6.113.82-.258.82-.577 
                0-.285-.01-1.04-.016-2.04-3.338.726-4.042-1.61-4.042-1.61 
                -.546-1.387-1.333-1.757-1.333-1.757-1.089-.745.084-.73.084-.73 
                1.205.084 1.84 1.236 1.84 1.236 1.07 1.835 2.807 1.304 3.492.997 
                .108-.776.418-1.305.76-1.605-2.665-.3-5.466-1.335-5.466-5.93 
                0-1.31.469-2.381 1.236-3.221-.124-.303-.536-1.523.117-3.176 0 0 
                1.008-.322 3.301 1.23a11.52 11.52 0 0 1 3.003-.404c1.018.005 2.043.138 
                3.002.404 2.292-1.552 3.3-1.23 3.3-1.23 .654 1.653.242 2.873.118 3.176 
                .77.84 1.235 1.911 1.235 3.221 0 4.61-2.803 5.625-5.475 5.92 
                .43.37.81 1.102.81 2.222 0 1.606-.015 2.897-.015 3.286 
                0 .319.218.69.82.574C20.565 22.092 24 17.592 24 12.297 
                24 5.67 18.627.297 12 .297z"
            ></path>
          </svg>
          <span class="text-sm font-medium">Documentación</span>
        </a>

        <a
          routerLink="../about-us"
          class="footer-link group flex items-center gap-2 px-4 py-2 rounded-lg transition-all duration-300"
          [ngClass]="isDarkMode 
            ? 'hover:bg-gray-800/50 text-gray-300 hover:text-cyan-400' 
            : 'hover:bg-blue-50 text-gray-700 hover:text-blue-600'"
        >
          <svg
            class="w-5 h-5 transition-transform duration-300 group-hover:scale-110 group-hover:rotate-12"
            fill="currentColor"
            viewBox="0 0 24 24"
            aria-hidden="true"
          >
            <path
              d="M12 2C6.486 2 2 6.487 2 12s4.486 10 10 10 
                10-4.487 10-10S17.514 2 12 2zm0 18c-4.419 
                0-8-3.581-8-8s3.581-8 8-8 8 3.581 8 8-3.581 
                8-8 8z"
            />
            <path d="M11 11h2v5h-2zm0-4h2v2h-2z" />
          </svg>
          <span class="text-sm font-medium">Acerca de</span>
        </a>

        <a
          href="mailto:sebasthefallen&#64;gmail.com"
          target="_blank"
          rel="noopener noreferrer"
          class="footer-link group flex items-center gap-2 px-4 py-2 rounded-lg transition-all duration-300"
          [ngClass]="isDarkMode 
            ? 'hover:bg-gray-800/50 text-gray-300 hover:text-cyan-400' 
            : 'hover:bg-blue-50 text-gray-700 hover:text-blue-600'"
        >
          <svg
            class="w-5 h-5 transition-transform duration-300 group-hover:scale-110 group-hover:-rotate-12"
            fill="currentColor"
            viewBox="0 0 24 24"
            aria-hidden="true"
          >
            <path
              d="M21.99 4c0-1.1-.9-2-2-2H3.99c-1.1 0-1.99.9-1.99
                2v16c0 1.1.89 2 1.99 2h16c1.1 0 2-.9 
                2-2V4zm-2 2l-7 4.99L4 6V4l7.99 
                5L20 4v2z"
            />
          </svg>
          <span class="text-sm font-medium">Contacto</span>
        </a>
      </div>
    </div>
  </div>
</footer>
